name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      UV_DEFAULT_INDEX: https://mirrors.aliyun.com/pypi/simple
    
    services:
      neo4j:
        image: neo4j:5.26
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: memstack
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v1
      
      - name: Install dependencies
        run: |
          uv sync --extra dev --extra neo4j

      - name: Validate plugin template packaging
        run: |
          uv build examples/plugins/memstack-plugin-template --wheel --out-dir /tmp/plugin-template-wheels
          ls -1 /tmp/plugin-template-wheels/*.whl
          python - <<'PY'
          import glob
          import os
          import zipfile

          wheels = glob.glob("/tmp/plugin-template-wheels/*.whl")
          assert wheels, (
              "No wheel was generated in /tmp/plugin-template-wheels; "
              f"contents={os.listdir('/tmp/plugin-template-wheels')}"
          )
          with zipfile.ZipFile(wheels[0]) as archive:
              entry_files = [
                  name for name in archive.namelist() if name.endswith(".dist-info/entry_points.txt")
              ]
              assert entry_files, (
                  "entry_points.txt missing from wheel; "
                  f"wheel={wheels[0]}"
              )
              content = archive.read(entry_files[0]).decode("utf-8")
              assert "[memstack.agent_plugins]" in content, (
                  "memstack.agent_plugins entry point group missing"
              )
          print("Plugin template entry point verified")
          PY

      - name: Validate local Feishu plugin discovery
        run: |
          test -f .memstack/plugins/feishu/plugin.py
          uv run python - <<'PY'
          from pathlib import Path

          from src.infrastructure.agent.plugins.discovery import discover_plugins
          from src.infrastructure.agent.plugins.state_store import PluginStateStore

          root = Path.cwd()
          store = PluginStateStore(base_path=root)
          discovered, diagnostics = discover_plugins(
              state_store=store,
              include_builtins=False,
              include_entrypoints=False,
              include_local_paths=True,
          )
          names = [item.name for item in discovered]
          assert "feishu-channel-plugin" in names, (
              "feishu-channel-plugin was not discovered from .memstack/plugins"
          )
          assert all(d.code != "plugin_discovery_failed" for d in diagnostics)
          print("Local Feishu plugin discovery verified")
          PY

      - name: Guard wrapped ORM select execute usage
        run: |
          uv run python scripts/check_refresh_select_execute.py
      
      - name: Run linters
        run: |
          uv run ruff check src/ sdk/
          uv run mypy src/ --ignore-missing-imports
      
      - name: Run tests
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: testpassword
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: memstack
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          LLM_PROVIDER: gemini
        run: |
          uv run pytest src/tests/unit \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=72
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  web:
    name: Web Typecheck, Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run type-check

      - name: Run unit tests
        run: pnpm run test

      - name: Build production bundle
        run: pnpm run build

  agi-stack-strangler-gate:
    name: agi-stack Strangler Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agi-stack
    env:
      DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/memstack
      REDIS_URL: redis://localhost:6379
      LLM_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: memstack
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy
          rustup target add wasm32-unknown-unknown

      - name: Run strangler gate
        run: make strangler-gate

  agi-stack-bench:
    name: agi-stack Bench Scorecard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agi-stack

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Restore previous approved bench scorecard
        id: bench-baseline-cache
        uses: actions/cache/restore@v4
        with:
          path: agi-stack/target/bench/baseline
          key: agi-stack-bench-scorecard-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            agi-stack-bench-scorecard-${{ github.ref_name }}-

      - name: Select restored bench baseline
        run: |
          mkdir -p target/bench/baseline
          if [ -s target/bench/baseline/scorecard.json ]; then
            echo "BENCH_BASELINE=target/bench/baseline/scorecard.json" >> "$GITHUB_ENV"
            echo "Using restored bench baseline: target/bench/baseline/scorecard.json"
          else
            echo "BENCH_BASELINE=" >> "$GITHUB_ENV"
            echo "No previous approved bench baseline restored"
          fi

      - name: Run go/no-go bench scorecard
        run: make bench

      - name: Publish bench trend summary
        if: always()
        run: |
          if [ -f target/bench/scorecard.json ]; then
            if [ -n "${BENCH_BASELINE:-}" ]; then
              python3 scripts/bench-trend-summary.py target/bench/scorecard.json --baseline "$BENCH_BASELINE"
            else
              python3 scripts/bench-trend-summary.py target/bench/scorecard.json
            fi
          else
            {
              echo "## agi-stack Bench Scorecard"
              echo ""
              echo "Bench did not produce target/bench/scorecard.json."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Stage approved bench scorecard baseline
        if: success()
        run: |
          mkdir -p target/bench/baseline
          cp target/bench/scorecard.json target/bench/baseline/scorecard.json

      - name: Save approved bench scorecard baseline
        if: success()
        uses: actions/cache/save@v4
        with:
          path: agi-stack/target/bench/baseline
          key: agi-stack-bench-scorecard-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload bench scorecard report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agi-stack-bench-scorecard
          path: agi-stack/target/bench/scorecard.json
          if-no-files-found: error

  agi-stack-desktop-bundle:
    name: agi-stack Desktop Bundle
    runs-on: macos-latest
    defaults:
      run:
        working-directory: agi-stack

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: agi-stack/apps/desktop/pnpm-lock.yaml

      - name: Verify desktop source
        run: make desktop-check

      - name: Verify desktop frontend contracts
        run: |
          make desktop-deps
          cd apps/desktop && pnpm test

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build desktop bundle
        run: make desktop-bundle

      - name: Smoke check desktop bundle
        run: make desktop-bundle-smoke

      - name: Upload desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: agi-stack-desktop-bundle
          path: agi-stack/apps/desktop/src-tauri/target/release/bundle/**
          if-no-files-found: error

  agi-stack-android-artifact:
    name: agi-stack Android Artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agi-stack

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;30.0.14904198"

      - name: Build Android mobile library
        run: make android NDK="$ANDROID_HOME/ndk/30.0.14904198" NDK_HOST_TAG=linux-x86_64

      - name: Upload Android mobile artifact
        uses: actions/upload-artifact@v4
        with:
          name: agi-stack-android-mobile
          path: |
            agi-stack/target/aarch64-linux-android/release/libagistack_mobile.so
            agi-stack/target/kotlin/**
          if-no-files-found: error

  agi-stack-ios-artifact:
    name: agi-stack iOS Artifact
    runs-on: macos-latest
    defaults:
      run:
        working-directory: agi-stack

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build iOS mobile library
        run: make ios

      - name: Upload iOS mobile artifact
        uses: actions/upload-artifact@v4
        with:
          name: agi-stack-ios-mobile
          path: |
            agi-stack/target/AgistackMobile.xcframework/**
            agi-stack/target/uniffi-swift/**
            agi-stack/target/ios-headers/**
          if-no-files-found: error

