name: E2E Browser Gates

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  web-smoke:
    name: Web Playwright Smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run backend-independent smoke tests
        env:
          CI: true
        run: pnpm exec playwright test e2e/smoke.spec.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: web/playwright-report
          if-no-files-found: ignore

  backend-e2e:
    name: Backend-dependent Playwright Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: memstack
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d memstack"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      neo4j:
        image: neo4j:5.26-community
        env:
          NEO4J_AUTH: neo4j/testpassword
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/memstack
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: memstack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpassword
      REDIS_URL: redis://localhost:6379
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword
      SECRET_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      LLM_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      AGENT_RUNTIME_MODE: local
      AGENT_SESSION_PREWARM_ENABLED: false
      RUN_BACKGROUND_WORKERS: false
      SANDBOX_DOCKER_SERVICES_ENABLED: false
      WORKSPACE_SUPERVISOR_ENABLED: false
      SKILL_EVOLUTION_ENABLED: false
      WORKSPACE_PLAN_OUTBOX_ENABLED: false
      BLACKBOARD_OUTBOX_ENABLED: false
      WORKSPACE_ATTEMPT_RECOVERY_ENABLED: false
      WORKSPACE_TASK_EXECUTION_SESSION_RECOVERY_ENABLED: false
      WORKSPACE_AUTONOMY_IDLE_WAKE_ENABLED: false
      ENABLE_TELEMETRY: false
      LANGFUSE_ENABLED: false
      MCP_ENABLED: false
      CI: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install backend dependencies
        run: uv sync --extra dev --dev --frozen

      - name: Apply database migrations
        run: PYTHONPATH=. uv run alembic upgrade head

      - name: Start API and wait for health
        run: |
          mkdir -p backend-e2e-logs
          nohup uv run uvicorn src.infrastructure.adapters.primary.web.main:app \
            --host 0.0.0.0 --port 8000 > backend-e2e-logs/api.log 2>&1 &
          echo $! > backend-e2e-logs/api.pid
          for attempt in $(seq 1 60); do
            if curl -fsS http://localhost:8000/health; then
              exit 0
            fi
            sleep 2
          done
          tail -200 backend-e2e-logs/api.log
          exit 1

      - name: Verify backend bootstrap
        run: uv run python scripts/verify_e2e_backend.py

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install Web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run backend-dependent smoke
        working-directory: web
        run: pnpm exec playwright test e2e/backend-smoke.spec.ts

      - name: Upload backend and browser reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-e2e-reports
          path: |
            backend-e2e-logs
            web/playwright-report
            web/test-results
          if-no-files-found: ignore

  # The complete product E2E suite remains opt-in because Agent, Graph, Memory,
  # and Sandbox scenarios still require deterministic Ray, LLM, and container
