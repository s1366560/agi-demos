# Babel extraction configuration for MemStack backend i18n.
# Run via:
#   uv run pybabel extract -F src/infrastructure/i18n/babel.cfg -o messages.pot src/
# Update existing locale catalogs:
#   uv run pybabel update -i messages.pot -d src/infrastructure/i18n/locales -D messages
# Compile to .mo:
#   uv run pybabel compile -d src/infrastructure/i18n/locales -D messages
[python: **.py]
extensions = jinja2.ext.do
encoding = utf-8
