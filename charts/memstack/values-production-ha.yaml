secrets:
  existingSecret: memstack-secrets

api:
  replicaCount: 3
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: api
            topologyKey: kubernetes.io/hostname
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: api
  pdb:
    enabled: true
    minAvailable: 2

web:
  replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: web
            topologyKey: kubernetes.io/hostname
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: web
  pdb:
    enabled: true
    minAvailable: 1

postgres:
  enabled: true

redis:
  enabled: true
  auth:
    enabled: true
    existingSecret: memstack-redis-db
  enterprise:
    cluster:
      nodes: 3
      persistentSpec:
        enabled: true
        volumeSize: 20Gi
        storageClassName: fast-retain
      redisEnterpriseNodeResources:
        requests:
          cpu: "2"
          memory: 4Gi
        limits:
          cpu: "4"
          memory: 8Gi
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - redis-enterprise
            topologyKey: kubernetes.io/hostname
      extraSpec:
        licenseSecretName: memstack-redis-license
    database:
      memorySize: 2GB
      replication: true
      persistence: aofEverySecond
      rackAware: true

neo4j:
  enabled: true
  official:
    clusterName: memstack-neo4j
    acceptLicenseAgreement: "yes"
    minimumClusterSize: 3
    resources:
      cpu: "2"
      memory: "5Gi"
    storageClass: fast-retain
    storageSize: 50Gi
  auth:
    username: neo4j
    existingSecret: memstack-neo4j-auth

minio:
  enabled: true

cnpg-operator:
  replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  monitoring:
    podMonitorEnabled: true

postgres-cluster:
  cluster:
    instances: 3
    storage:
      size: 50Gi
      storageClass: fast-retain
    resources:
      requests:
        cpu: "1"
        memory: 2Gi
      limits:
        cpu: "2"
        memory: 4Gi
    affinity:
      topologyKey: topology.kubernetes.io/zone
    enablePDB: true
    initdb:
      database: memstack
      owner: postgres
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS vector;
    monitoring:
      enabled: true
      podMonitor:
        enabled: true
  backups:
    enabled: false

neo4j-core-1: &neo4jProdCore
  disableLookups: true
  podSpec:
    loadbalancer: include
  neo4j:
    name: memstack-neo4j
    edition: enterprise
    acceptLicenseAgreement: "yes"
    minimumClusterSize: 3
    passwordFromSecret: memstack-neo4j-auth
    resources:
      cpu: "2"
      memory: "5Gi"
  volumes:
    data:
      mode: dynamic
      dynamic:
        storageClassName: fast-retain
        accessModes:
          - ReadWriteOnce
        requests:
          storage: 50Gi
  config:
    server.config.strict_validation.enabled: "false"
    server.memory.heap.initial_size: "3G"
    server.memory.heap.max_size: "3G"
    server.memory.pagecache.size: "1G"
    dbms.security.procedures.unrestricted: apoc.*
  services:
    neo4j:
      enabled: false
    admin:
      enabled: true
  logInitialPassword: false

neo4j-core-2:
  <<: *neo4jProdCore
  nameOverride: neo4j-2

neo4j-core-3:
  <<: *neo4jProdCore
  nameOverride: neo4j-3

neo4j-headless:
  neo4j:
    name: memstack-neo4j
    edition: enterprise
  ports:
    https:
      enabled: false

minio-operator:
  operator:
    replicaCount: 2
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi

minio-tenant:
  tenant:
    name: memstack-minio
    configSecret:
      name: memstack-minio-env
      existingSecret: true
      accessKey: ""
      secretKey: ""
    pools:
      - servers: 4
        name: pool-0
        volumesPerServer: 4
        size: 50Gi
        storageClassName: fast-retain
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 4Gi
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    v1.min.io/tenant: memstack-minio
                topologyKey: kubernetes.io/hostname
    certificate:
      requestAutoCert: false
    buckets:
      - name: memstack-files
        region: us-east-1
    metrics:
      enabled: true
    prometheusOperator: true
