nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

serviceAccount:
  create: false
  name: ""
  annotations: {}

waitImage:
  repository: busybox
  tag: "1.36"
  pullPolicy: IfNotPresent

config:
  apiAllowedOrigins: "*"
  logLevel: INFO
  logFormat: json
  llmProvider: gemini
  agentRuntimeMode: local
  runBackgroundWorkers: "false"
  workspaceSupervisorEnabled: "false"
  sandboxDockerServicesEnabled: "false"
  skillEvolutionEnabled: "false"
  enableTelemetry: "false"
  langfuseEnabled: "false"
  requireApiKey: "true"
  queueBatchSize: "1"
  s3NoProxy: "true"
  extraEnv: {}

secrets:
  existingSecret: ""
  secretKey: 2a0237a3dbd413a52f04f0c4a0e6b183f16694229e8dca3a9b8eb9e33c7d3419
  llmEncryptionKey: 2a0237a3dbd413a52f04f0c4a0e6b183f16694229e8dca3a9b8eb9e33c7d3419
  providerApiKeys: {}
  # Example:
  # providerApiKeys:
  #   OPENAI_API_KEY: sk-...
  #   GEMINI_API_KEY: ...

api:
  enabled: true
  replicaCount: 1
  image:
    repository: memstack-api
    tag: latest
    pullPolicy: IfNotPresent
  command: []
  args: []
  waitForDependencies: true
  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
  service:
    type: ClusterIP
    port: 8000
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  pdb:
    enabled: false
    minAvailable: 1
    maxUnavailable: ""
  extraEnv: {}
  extraEnvFrom: []

web:
  enabled: true
  replicaCount: 1
  image:
    repository: memstack-web
    tag: latest
    pullPolicy: IfNotPresent
  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
  service:
    type: ClusterIP
    port: 80
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  pdb:
    enabled: false
    minAvailable: 1
    maxUnavailable: ""
  extraEnv: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: memstack.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

postgres:
  enabled: true
  image:
    repository: pgvector/pgvector
    tag: pg16
    pullPolicy: IfNotPresent
  auth:
    username: postgres
    password: password
    database: memstack
  service:
    port: 5432
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  resources: {}
  external:
    host: ""
    port: 5432

redis:
  enabled: true
  auth:
    enabled: false
    existingSecret: ""
    password: ""
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  command:
    - redis-server
    - --maxmemory
    - 384mb
    - --maxmemory-policy
    - allkeys-lru
  service:
    name: ""
    port: 6379
  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  resources: {}
  enterprise:
    cluster:
      name: ""
      nodes: 3
      uiServiceType: ClusterIP
      persistentSpec:
        enabled: true
        volumeSize: 8Gi
        storageClassName: ""
      redisEnterpriseNodeResources: {}
      bootstrapperResources: {}
      redisEnterpriseServicesRiggerResources: {}
      podAntiAffinity: {}
      extraSpec: {}
    database:
      name: ""
      memorySize: 1GB
      replication: true
      persistence: aofEverySecond
      rackAware: false
      shardCount: 1
      proxyPolicy: single
      extraSpec: {}
  external:
    host: ""
    port: 6379

neo4j:
  enabled: true
  official:
    clusterName: memstack-neo4j
    headlessServiceName: ""
    acceptLicenseAgreement: "yes"
    minimumClusterSize: 3
    resources:
      cpu: "1000m"
      memory: "2Gi"
    storageClass: ""
    storageSize: 8Gi
    loadBalancer: include
  image:
    repository: neo4j
    tag: 5.26-community
    pullPolicy: IfNotPresent
  auth:
    username: neo4j
    password: password
    existingSecret: ""
  plugins: '["apoc"]'
  unrestrictedProcedures: apoc.*
  heapMaxSize: 1G
  pageCacheSize: 512M
  service:
    httpPort: 7474
    boltPort: 7687
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  resources: {}
  external:
    host: ""
    boltPort: 7687

minio:
  enabled: true
  image:
    repository: minio/minio
    tag: latest
    pullPolicy: IfNotPresent
  mcImage:
    repository: minio/mc
    tag: latest
    pullPolicy: IfNotPresent
  auth:
    rootUser: minioadmin
    rootPassword: minioadmin
  bucket: memstack-files
  service:
    name: minio
    apiPort: 9000
    consolePort: 9001
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  resources: {}
  external:
    endpointUrl: ""

cnpg-operator:
  replicaCount: 1

postgres-cluster:
  type: postgresql
  version:
    postgresql: "16"
  cluster:
    instances: 3
    storage:
      size: 8Gi
      storageClass: ""
    resources: {}
    initdb:
      database: memstack
      owner: postgres
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS vector;
  backups:
    enabled: false

neo4j-core-1: &neo4jCoreDefaults
  disableLookups: true
  nameOverride: neo4j-1
  podSpec:
    loadbalancer: include
  neo4j:
    name: memstack-neo4j
    edition: enterprise
    acceptLicenseAgreement: "yes"
    minimumClusterSize: 3
    passwordFromSecret: memstack-neo4j-auth
    resources:
      cpu: "1000m"
      memory: "2Gi"
  services:
    neo4j:
      enabled: false
    admin:
      enabled: true
  volumes:
    data:
      mode: defaultStorageClass
      defaultStorageClass:
        accessModes:
          - ReadWriteOnce
        requests:
          storage: 8Gi
  config:
    server.config.strict_validation.enabled: "false"
    server.memory.heap.max_size: "1G"
    server.memory.pagecache.size: "512M"
    dbms.security.procedures.unrestricted: apoc.*
  apoc_config: {}
  logInitialPassword: false

neo4j-core-2:
  <<: *neo4jCoreDefaults
  nameOverride: neo4j-2

neo4j-core-3:
  <<: *neo4jCoreDefaults
  nameOverride: neo4j-3

neo4j-headless:
  neo4j:
    name: memstack-neo4j
    edition: enterprise
  ports:
    https:
      enabled: false
  spec:
    type: ClusterIP
    clusterIP: None

minio-operator:
  operator:
    replicaCount: 1

minio-tenant:
  tenant:
    name: memstack-minio
    configSecret:
      name: memstack-minio-env
      accessKey: minioadmin
      secretKey: minioadmin
    pools:
      - servers: 4
        name: pool-0
        volumesPerServer: 1
        size: 8Gi
        resources: {}
    certificate:
      requestAutoCert: false
    buckets:
      - name: memstack-files
        region: us-east-1
    metrics:
      enabled: false
    exposeServices: {}

ray:
  enabled: false
  head:
    image:
      repository: agi-demos-ray-head
      tag: latest
      pullPolicy: IfNotPresent
    resources: {}
  worker:
    replicaCount: 1
    image:
      repository: agi-demos-ray-worker
      tag: latest
      pullPolicy: IfNotPresent
    resources: {}

agentActor:
  enabled: false
  replicaCount: 1
  image:
    repository: agi-demos-ray-head
    tag: latest
    pullPolicy: IfNotPresent
  resources: {}
