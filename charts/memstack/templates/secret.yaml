{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "memstack.secretName" . }}
  labels:
    {{- include "memstack.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret-key: {{ .Values.secrets.secretKey | quote }}
  llm-encryption-key: {{ .Values.secrets.llmEncryptionKey | quote }}
  postgres-password: {{ .Values.postgres.auth.password | quote }}
  redis-password: {{ .Values.redis.auth.password | quote }}
  neo4j-password: {{ .Values.neo4j.auth.password | quote }}
  neo4j-auth: {{ printf "%s/%s" .Values.neo4j.auth.username .Values.neo4j.auth.password | quote }}
  minio-root-user: {{ .Values.minio.auth.rootUser | quote }}
  minio-root-password: {{ .Values.minio.auth.rootPassword | quote }}
  aws-access-key-id: {{ .Values.minio.auth.rootUser | quote }}
  aws-secret-access-key: {{ .Values.minio.auth.rootPassword | quote }}
  {{- range $key, $value := .Values.secrets.providerApiKeys }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
{{- if and .Values.redis.enabled (not .Values.redis.auth.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "memstack.redisDatabaseSecretName" . }}
  labels:
    {{- include "memstack.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
type: Opaque
stringData:
  password: {{ ternary .Values.redis.auth.password "" .Values.redis.auth.enabled | quote }}
{{- end }}
{{- if and .Values.neo4j.enabled (not .Values.neo4j.auth.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "memstack.neo4jAuthSecretName" . }}
  labels:
    {{- include "memstack.labels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
type: Opaque
stringData:
  NEO4J_AUTH: {{ printf "%s/%s" .Values.neo4j.auth.username .Values.neo4j.auth.password | quote }}
{{- end }}
