{{- if .Values.neo4j.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "memstack.fullname" . }}-neo4j
  labels:
    {{- include "memstack.labels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
spec:
  ports:
    - port: {{ .Values.neo4j.service.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.neo4j.service.boltPort }}
      targetPort: bolt
      protocol: TCP
      name: bolt
  selector:
    {{- include "memstack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "memstack.fullname" . }}-neo4j
  labels:
    {{- include "memstack.labels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
spec:
  serviceName: {{ include "memstack.fullname" . }}-neo4j
  replicas: 1
  selector:
    matchLabels:
      {{- include "memstack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: neo4j
  template:
    metadata:
      labels:
        {{- include "memstack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: neo4j
    spec:
      containers:
        - name: neo4j
          image: "{{ .Values.neo4j.image.repository }}:{{ .Values.neo4j.image.tag }}"
          imagePullPolicy: {{ .Values.neo4j.image.pullPolicy }}
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ include "memstack.secretName" . }}
                  key: neo4j-auth
            - name: NEO4J_PLUGINS
              value: {{ .Values.neo4j.plugins | quote }}
            - name: NEO4J_dbms_security_procedures_unrestricted
              value: {{ .Values.neo4j.unrestrictedProcedures | quote }}
            - name: NEO4J_dbms_memory_heap_max__size
              value: {{ .Values.neo4j.heapMaxSize | quote }}
            - name: NEO4J_dbms_memory_pagecache_size
              value: {{ .Values.neo4j.pageCacheSize | quote }}
          ports:
            - name: http
              containerPort: 7474
              protocol: TCP
            - name: bolt
              containerPort: 7687
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: bolt
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: bolt
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: bolt
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
          volumeMounts:
            - name: data
              mountPath: /data
          {{- with .Values.neo4j.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if not .Values.neo4j.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
  {{- if .Values.neo4j.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.neo4j.persistence.accessModes | nindent 10 }}
        {{- if .Values.neo4j.persistence.storageClass }}
        storageClassName: {{ .Values.neo4j.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.neo4j.persistence.size | quote }}
  {{- end }}
{{- end }}
