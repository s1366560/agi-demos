{{- if .Values.agentActor.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "memstack.fullname" . }}-agent-actor
  labels:
    {{- include "memstack.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-actor
spec:
  replicas: {{ .Values.agentActor.replicaCount }}
  selector:
    matchLabels:
      {{- include "memstack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent-actor
  template:
    metadata:
      labels:
        {{- include "memstack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent-actor
    spec:
      initContainers:
        {{- include "memstack.waitForPort" (dict "name" "ray-head" "host" (printf "%s-ray-head" (include "memstack.fullname" .)) "port" 10001 "Values" .Values) | nindent 8 }}
      containers:
        - name: agent-actor
          image: "{{ .Values.agentActor.image.repository }}:{{ .Values.agentActor.image.tag }}"
          imagePullPolicy: {{ .Values.agentActor.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
            - python -m src.agent_actor_worker
          env:
            - name: RAY_ADDRESS
              value: ray://{{ include "memstack.fullname" . }}-ray-head:10001
            - name: RAY_NAMESPACE
              value: memstack
            - name: REDIS_HOST
              value: {{ include "memstack.redisHost" . | quote }}
            - name: REDIS_PORT
              value: {{ .Values.redis.service.port | quote }}
            {{- if .Values.redis.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "memstack.redisDatabaseSecretName" . }}
                  key: password
            {{- end }}
            - name: REDIS_URL
              value: {{ include "memstack.redisUrl" . | quote }}
            - name: POSTGRES_HOST
              value: {{ include "memstack.postgresHost" . | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.postgres.service.port | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "memstack.postgresPasswordSecretName" . }}
                  key: {{ include "memstack.postgresPasswordSecretKey" . }}
            - name: DATABASE_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)
            - name: NEO4J_URI
              value: {{ include "memstack.neo4jUri" . | quote }}
            - name: NEO4J_USER
              value: {{ .Values.neo4j.auth.username | quote }}
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "memstack.secretName" . }}
                  key: neo4j-password
          {{- with .Values.agentActor.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
