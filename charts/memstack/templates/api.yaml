{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "memstack.fullname" . }}-api
  labels:
    {{- include "memstack.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "memstack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "memstack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "memstack.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.api.waitForDependencies }}
      initContainers:
        {{- include "memstack.waitForPort" (dict "name" "postgres" "host" (include "memstack.postgresHost" .) "port" .Values.postgres.service.port "Values" .Values) | nindent 8 }}
        {{- include "memstack.waitForPort" (dict "name" "redis" "host" (include "memstack.redisHost" .) "port" .Values.redis.service.port "Values" .Values) | nindent 8 }}
        {{- include "memstack.waitForPort" (dict "name" "neo4j" "host" (include "memstack.neo4jHost" .) "port" .Values.neo4j.service.boltPort "Values" .Values) | nindent 8 }}
        {{- if .Values.minio.enabled }}
        {{- include "memstack.waitForPort" (dict "name" "minio" "host" (include "memstack.minioHost" .) "port" .Values.minio.service.apiPort "Values" .Values) | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          {{- with .Values.api.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "memstack.fullname" . }}-config
            {{- with .Values.api.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "memstack.secretName" . }}
                  key: secret-key
            - name: LLM_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "memstack.secretName" . }}
                  key: llm-encryption-key
            - name: POSTGRES_HOST
              value: {{ include "memstack.postgresHost" . | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.postgres.service.port | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "memstack.postgresPasswordSecretName" . }}
                  key: {{ include "memstack.postgresPasswordSecretKey" . }}
            - name: DATABASE_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)
            - name: REDIS_HOST
              value: {{ include "memstack.redisHost" . | quote }}
            - name: REDIS_PORT
              value: {{ .Values.redis.service.port | quote }}
            {{- if .Values.redis.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "memstack.redisDatabaseSecretName" . }}
                  key: password
            {{- end }}
            - name: REDIS_URL
              value: {{ include "memstack.redisUrl" . | quote }}
            - name: NEO4J_URI
              value: {{ include "memstack.neo4jUri" . | quote }}
            - name: NEO4J_USER
              value: {{ .Values.neo4j.auth.username | quote }}
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "memstack.secretName" . }}
                  key: neo4j-password
            - name: AWS_REGION
              value: us-east-1
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "memstack.secretName" . }}
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "memstack.secretName" . }}
                  key: aws-secret-access-key
            - name: S3_BUCKET_NAME
              value: {{ .Values.minio.bucket | quote }}
            - name: S3_ENDPOINT_URL
              value: {{ include "memstack.minioEndpoint" . | quote }}
            {{- range $key, $_ := .Values.secrets.providerApiKeys }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "memstack.secretName" $ }}
                  key: {{ $key }}
                  optional: true
            {{- end }}
            {{- range $key, $value := .Values.api.extraEnv }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
          {{- with .Values.api.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "memstack.fullname" . }}-api
  labels:
    {{- include "memstack.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "memstack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
{{- if .Values.api.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "memstack.fullname" . }}-api
  labels:
    {{- include "memstack.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- with .Values.api.pdb.minAvailable }}
  minAvailable: {{ . }}
  {{- end }}
  {{- with .Values.api.pdb.maxUnavailable }}
  maxUnavailable: {{ . }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "memstack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
{{- end }}
{{- end }}
