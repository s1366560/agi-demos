id: config-timeout-fix
category: config_runtime_issue
prompt: |
  Fix app_config.py so timeout_seconds returns an integer timeout.
verification_command: |
  python3 - <<'PY'
  import importlib.util
  from pathlib import Path

  spec = importlib.util.spec_from_file_location("app_config", Path("app_config.py"))
  module = importlib.util.module_from_spec(spec)
  assert spec.loader is not None
  spec.loader.exec_module(module)
  assert module.timeout_seconds() == 30
  assert isinstance(module.timeout_seconds(), int)
  PY
target_repo: ../fixtures/config_project
expected_files:
  - app_config.py
deterministic_commands:
  - |
    python3 - <<'PY'
    from pathlib import Path

    path = Path("app_config.py")
    path.write_text(
        "DEFAULT_TIMEOUT_SECONDS = 30\n\n\n"
        "def timeout_seconds() -> int:\n"
        "    return DEFAULT_TIMEOUT_SECONDS\n",
        encoding="utf-8",
    )
    PY
metadata:
  purpose: config/runtime issue capability case
