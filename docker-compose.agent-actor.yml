services:
  agent-actor-worker:
    image: agi-demos-ray-head:latest
    container_name: memstack-agent-actor-worker
    command: >
      bash -c "pip install -e . --quiet 2>/dev/null || true
      && python -m src.agent_actor_worker"
    environment:
      - RAY_ADDRESS=auto
      - RAY_NAMESPACE=memstack

      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/memstack
      - REDIS_URL=redis://redis:6379

      - LLM_PROVIDER=${LLM_PROVIDER:-dashscope}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - ZAI_API_KEY=${ZAI_API_KEY}

      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
    depends_on:
      ray-head:
        condition: service_started
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    network_mode: service:ray-head
    volumes:
      - ./src:/app/src:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./docker/ray-runtime.env:/app/.env:ro
      - ray-runtime:/tmp/ray
    mem_limit: 2g
    cpus: "1.0"
    restart: unless-stopped
